    <meta id="themeColorMeta" name="theme-color" content="#eef2f0" />
    <meta name="description" content="洄·Maneo信箱的世界预留页" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%235c8b85'/%3E%3Cg fill='none' stroke='white' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='32' cy='32' r='21'/%3E%3Cpath d='M12 25h40M12 39h40M32 11c7 6 10 13 10 21S39 47 32 53c-7-6-10-13-10-21s3-15 10-21Z'/%3E%3C/g%3E%3C/svg%3E"
    />
    <title>洄·Maneo · 世界</title>
    <script>
      try {
        var savedAppearance = JSON.parse(
          localStorage.getItem("island-chat.preferences.v1")
        );
        var legacyThemes = { coast: "zen", dusk: "sage", paper: "blush" };
        var savedTheme =
          (savedAppearance &&
            (savedAppearance.theme ||
              legacyThemes[savedAppearance.id] ||
              savedAppearance.id)) ||
          "mist";
        var themeColors = {
          mist: "#eef2f0",
          zen: "#f2efe8",
          sage: "#f1f1e7",
          blush: "#ebeef1"
        };
        if (!themeColors[savedTheme]) {
          savedTheme = "mist";
        }
        document.documentElement.dataset.theme = savedTheme;
        document.getElementById("themeColorMeta").setAttribute(
          "content",
          themeColors[savedTheme]
        );
      } catch (error) {
        document.documentElement.dataset.theme = "mist";
      }
    </script>
    <link rel="stylesheet" href="styles.css?v=20260711-theme-palettes-v1" />
