<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta id="themeColorMeta" name="theme-color" content="#eef2f1" />
    <meta
      name="description"
      content="一个支持自定义聊天背景的 Telegram 风格对话页原型"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%233193d1'/%3E%3Cpath d='M13 30 51 14 39 49l-9-10-7 7 1-13 22-14-27 11z' fill='white'/%3E%3C/svg%3E"
    />
    <title>岛屿信箱 · 对话</title>
    <link rel="stylesheet" href="styles.css?v=20260710-4themes" />
  </head>
  <body>
    <svg class="svg-sprite" aria-hidden="true">
      <symbol id="icon-menu" viewBox="0 0 24 24">
        <path d="M4 7h16M4 12h16M4 17h16" />
      </symbol>
      <symbol id="icon-search" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="6.5" />
        <path d="m16 16 4 4" />
      </symbol>
      <symbol id="icon-edit" viewBox="0 0 24 24">
        <path d="m14.5 5.5 4 4M5 19l3.7-.8L19 6.9a1.4 1.4 0 0 0 0-2l-.9-.9a1.4 1.4 0 0 0-2 0L5.8 14.3 5 19Z" />
      </symbol>
      <symbol id="icon-image" viewBox="0 0 24 24">
        <rect x="3.5" y="4.5" width="17" height="15" rx="2.5" />
        <circle cx="9" cy="9.5" r="1.6" />
        <path d="m5.5 17 4.1-4 3.1 2.7 2.4-2.2 3.4 3.5" />
      </symbol>
      <symbol id="icon-phone" viewBox="0 0 24 24">
        <path d="M8.1 4.1 5.8 5.3c-1 .5-1.4 1.6-1 2.6 2 5.3 5.9 9.2 11.2 11.2 1 .4 2.1 0 2.6-1l1.2-2.3-4.2-2-1.1 1.5c-2.5-1.1-4.7-3.3-5.8-5.8l1.5-1.1-2.1-4.3Z" />
      </symbol>
      <symbol id="icon-info" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="8.5" />
        <path d="M12 11v5.2M12 7.6v.1" />
      </symbol>
      <symbol id="icon-paperclip" viewBox="0 0 24 24">
        <path d="m9.2 12.8 5.3-5.3a3 3 0 0 1 4.2 4.2l-7.2 7.2a5 5 0 0 1-7.1-7.1l7.2-7.2" />
      </symbol>
      <symbol id="icon-smile" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="8.5" />
        <path d="M8.5 10h.1M15.4 10h.1M8.5 14.2c1 1.3 2.1 1.9 3.5 1.9s2.5-.6 3.5-1.9" />
      </symbol>
      <symbol id="icon-send" viewBox="0 0 24 24">
        <path d="m4 5 16 7-16 7 2.2-6.1L15 12l-8.8-.9L4 5Z" />
      </symbol>
      <symbol id="icon-chevron-down" viewBox="0 0 24 24">
        <path d="m7 10 5 5 5-5" />
      </symbol>
      <symbol id="icon-close" viewBox="0 0 24 24">
        <path d="m6 6 12 12M18 6 6 18" />
      </symbol>
      <symbol id="icon-upload" viewBox="0 0 24 24">
        <path d="M12 16V5M8 9l4-4 4 4M5 14v4a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4" />
      </symbol>
      <symbol id="icon-reset" viewBox="0 0 24 24">
        <path d="M5 8V4m0 0h4M5 4l3.2 3.2A7 7 0 1 1 5 12" />
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="m5 12 4 4L19 6" />
      </symbol>
      <symbol id="icon-lock" viewBox="0 0 24 24">
        <rect x="5" y="10" width="14" height="10" rx="2.5" />
        <path d="M8.5 10V7.5a3.5 3.5 0 0 1 7 0V10" />
      </symbol>
      <symbol id="icon-back" viewBox="0 0 24 24">
        <path d="m14.5 5-7 7 7 7" />
      </symbol>
    </svg>

    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>

    <div class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="会话列表">
        <header class="sidebar-header">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M4.2 11.3 19.4 4.7c.7-.3 1.3.4 1 1.1l-5 13.1c-.2.6-1 .7-1.4.3l-3.1-3.4-2.2 2c-.4.4-1.1.1-1.1-.5l.2-4.5 8.7-5.4-10 4.1-1.7.7c-.7.2-1.2-.6-.6-.9Z" />
            </svg>
          </div>
          <div class="brand-copy">
            <strong>岛屿信箱</strong>
            <span>保持一点联络</span>
          </div>
          <button class="icon-button subtle" type="button" aria-label="新建对话" data-toast="新建对话将在下一步接入">
            <svg><use href="#icon-edit"></use></svg>
          </button>
        </header>

        <div class="sidebar-search">
          <svg aria-hidden="true"><use href="#icon-search"></use></svg>
          <input id="conversationSearch" type="search" placeholder="搜索" autocomplete="off" aria-label="搜索会话" />
          <kbd>⌘ K</kbd>
        </div>

        <div class="conversation-heading">
          <span>最近消息</span>
          <button type="button" data-toast="全部消息已标记为已读">全部已读</button>
        </div>

        <nav class="conversation-list" id="conversationList">
          <button class="conversation-item active" type="button" data-chat="linxia">
            <span class="avatar avatar-linxia" aria-hidden="true">夏</span>
            <span class="conversation-copy">
              <span class="conversation-row">
                <strong>林夏</strong>
                <time>10:42</time>
              </span>
              <span class="conversation-row preview-row">
                <span class="message-preview">我也觉得雾蓝色很舒服</span>
                <span class="read-state" aria-label="已读">✓✓</span>
              </span>
            </span>
          </button>

          <button class="conversation-item" type="button" data-chat="design">
            <span class="avatar avatar-design" aria-hidden="true">设</span>
            <span class="conversation-copy">
              <span class="conversation-row">
                <strong>设计讨论组</strong>
                <time>09:16</time>
              </span>
              <span class="conversation-row preview-row">
                <span class="message-preview">周屿：新版原型发群里了</span>
                <span class="unread-badge">3</span>
              </span>
            </span>
          </button>

          <button class="conversation-item" type="button" data-chat="zhou">
            <span class="avatar avatar-zhou" aria-hidden="true">屿</span>
            <span class="conversation-copy">
              <span class="conversation-row">
                <strong>周屿</strong>
                <time>昨天</time>
              </span>
              <span class="conversation-row preview-row">
                <span class="message-preview">下周见，别忘了带相机 📷</span>
              </span>
            </span>
          </button>

          <button class="conversation-item" type="button" data-chat="notes">
            <span class="avatar avatar-notes" aria-hidden="true">记</span>
            <span class="conversation-copy">
              <span class="conversation-row">
                <strong>收藏夹</strong>
                <time>周二</time>
              </span>
              <span class="conversation-row preview-row">
                <span class="message-preview">旅行清单 · 海边路线</span>
              </span>
            </span>
          </button>
        </nav>

        <footer class="sidebar-footer">
          <button class="background-entry" id="sidebarBackgroundButton" type="button">
            <span class="entry-icon"><svg><use href="#icon-image"></use></svg></span>
            <span>
              <strong>配色与聊天背景</strong>
              <small>4 套主题或上传自己的图片</small>
            </span>
          </button>
          <div class="profile-row">
            <span class="avatar avatar-me" aria-hidden="true">我</span>
            <span>
              <strong>旅人</strong>
              <small>在线</small>
            </span>
            <span class="online-dot" aria-label="在线"></span>
          </div>
        </footer>
      </aside>

      <button class="sidebar-scrim" id="sidebarScrim" type="button" aria-label="关闭会话列表"></button>

      <section class="chat-panel" aria-label="当前对话">
        <header class="chat-header">
          <button class="icon-button mobile-menu" id="mobileMenuButton" type="button" aria-label="打开会话列表">
            <svg><use href="#icon-menu"></use></svg>
          </button>

          <button class="chat-person" type="button" data-toast="联系人详情将在下一步接入">
            <span class="avatar avatar-linxia" id="headerAvatar" aria-hidden="true">夏</span>
            <span class="person-copy">
              <strong id="headerName">林夏</strong>
              <small id="headerStatus">刚刚在线</small>
            </span>
          </button>

          <div class="header-actions">
            <button class="icon-button header-search-button" type="button" aria-label="搜索当前对话" data-toast="对话搜索将在下一步接入">
              <svg><use href="#icon-search"></use></svg>
            </button>
            <button class="icon-button" type="button" aria-label="语音通话" data-toast="语音通话将在下一步接入">
              <svg><use href="#icon-phone"></use></svg>
            </button>
            <button class="background-header-button" id="headerBackgroundButton" type="button">
              <svg><use href="#icon-image"></use></svg>
              <span>配色</span>
            </button>
            <button class="icon-button" type="button" aria-label="对话信息" data-toast="对话信息将在下一步接入">
              <svg><use href="#icon-info"></use></svg>
            </button>
          </div>
        </header>

        <div class="chat-main" id="chatMain">
          <div class="wallpaper" id="wallpaper" aria-hidden="true"></div>
          <div class="wallpaper-overlay" aria-hidden="true"></div>

          <div class="message-scroll" id="messageScroll">
            <div class="message-list" id="messageList" role="log" aria-live="polite" aria-label="消息"></div>
          </div>

          <button class="scroll-bottom-button" id="scrollBottomButton" type="button" aria-label="回到最新消息">
            <svg><use href="#icon-chevron-down"></use></svg>
            <span class="scroll-unread" id="scrollUnread" hidden>1</span>
          </button>

          <div class="composer-zone">
            <div class="emoji-panel" id="emojiPanel" hidden>
              <button type="button">😊</button>
              <button type="button">🥰</button>
              <button type="button">😂</button>
              <button type="button">👍</button>
              <button type="button">✨</button>
              <button type="button">🌊</button>
              <button type="button">☕</button>
              <button type="button">📷</button>
            </div>

            <form class="composer" id="composer">
              <button class="composer-button" type="button" aria-label="添加附件" data-toast="附件功能将在下一步接入">
                <svg><use href="#icon-paperclip"></use></svg>
              </button>
              <textarea
                id="messageInput"
                rows="1"
                maxlength="2000"
                placeholder="输入消息…"
                aria-label="消息内容"
              ></textarea>
              <button class="composer-button" id="emojiButton" type="button" aria-label="选择表情" aria-expanded="false">
                <svg><use href="#icon-smile"></use></svg>
              </button>
              <button class="send-button" id="sendButton" type="submit" aria-label="发送消息" disabled>
                <svg><use href="#icon-send"></use></svg>
              </button>
            </form>
            <p class="composer-hint">Enter 发送 · Shift + Enter 换行</p>
          </div>
        </div>
      </section>
    </div>

    <dialog class="background-dialog" id="backgroundDialog" aria-labelledby="backgroundDialogTitle">
      <form class="background-card" id="backgroundForm" method="dialog">
        <header class="dialog-header">
          <div>
            <span class="eyebrow">个性化</span>
            <h2 id="backgroundDialogTitle">配色与聊天背景</h2>
            <p>整套切换界面颜色，或使用你自己的照片。</p>
          </div>
          <button class="icon-button dialog-close" id="backgroundCloseButton" type="button" aria-label="关闭">
            <svg><use href="#icon-close"></use></svg>
          </button>
        </header>

        <div class="dialog-content">
          <section aria-labelledby="presetTitle">
            <div class="section-title-row">
              <h3 id="presetTitle">莫兰迪配色主题</h3>
              <span>4 套</span>
            </div>
            <div class="wallpaper-grid" id="wallpaperGrid">
              <button class="wallpaper-option selected" type="button" data-wallpaper="mist">
                <span class="preset-swatch preset-mist"></span>
                <span>雾蓝杏粉</span>
                <span class="selection-check"><svg><use href="#icon-check"></use></svg></span>
              </button>
              <button class="wallpaper-option" type="button" data-wallpaper="zen">
                <span class="preset-swatch preset-zen"></span>
                <span>禅意米棕</span>
                <span class="selection-check"><svg><use href="#icon-check"></use></svg></span>
              </button>
              <button class="wallpaper-option" type="button" data-wallpaper="sage">
                <span class="preset-swatch preset-sage"></span>
                <span>灰绿鹅黄</span>
                <span class="selection-check"><svg><use href="#icon-check"></use></svg></span>
              </button>
              <button class="wallpaper-option" type="button" data-wallpaper="blush">
                <span class="preset-swatch preset-blush"></span>
                <span>烟粉雾蓝</span>
                <span class="selection-check"><svg><use href="#icon-check"></use></svg></span>
              </button>
              <button class="wallpaper-option custom-wallpaper-option" id="customWallpaperOption" type="button" data-wallpaper="custom" hidden>
                <span class="preset-swatch" id="customWallpaperSwatch"></span>
                <span>我的图片</span>
                <span class="selection-check"><svg><use href="#icon-check"></use></svg></span>
              </button>
            </div>
          </section>

          <section class="upload-section" aria-labelledby="uploadTitle">
            <div class="section-title-row">
              <h3 id="uploadTitle">上传图片</h3>
              <span>最大 10 MB</span>
            </div>
            <label class="upload-dropzone" id="uploadDropzone" for="backgroundFile">
              <input id="backgroundFile" type="file" accept="image/jpeg,image/png,image/webp,image/gif" />
              <span class="upload-icon"><svg><use href="#icon-upload"></use></svg></span>
              <span class="upload-copy">
                <strong>选择图片或拖放到这里</strong>
                <small>支持 JPG、PNG、WebP 和 GIF</small>
              </span>
              <span class="upload-action">浏览文件</span>
            </label>
            <p class="upload-error" id="uploadError" role="alert" hidden></p>
          </section>

          <section class="appearance-section" aria-labelledby="appearanceTitle">
            <div class="section-title-row">
              <h3 id="appearanceTitle">可读性</h3>
              <span>即时预览</span>
            </div>
            <label class="range-row">
              <span>
                <strong>背景遮罩</strong>
                <small>让消息更容易阅读</small>
              </span>
              <input id="dimRange" type="range" min="0" max="48" value="16" />
              <output id="dimOutput" for="dimRange">16%</output>
            </label>
            <label class="range-row">
              <span>
                <strong>模糊程度</strong>
                <small>柔化复杂的图片细节</small>
              </span>
              <input id="blurRange" type="range" min="0" max="12" value="0" />
              <output id="blurOutput" for="blurRange">0px</output>
            </label>
          </section>

          <div class="privacy-note">
            <svg aria-hidden="true"><use href="#icon-lock"></use></svg>
            <p>
              <strong>图片只保存在这台设备</strong>
              <span>不会自动上传到服务器，随时可以恢复默认并清除。</span>
            </p>
          </div>
        </div>

        <footer class="dialog-footer">
          <button class="text-button danger" id="resetBackgroundButton" type="button">
            <svg><use href="#icon-reset"></use></svg>
            恢复默认
          </button>
          <div class="dialog-footer-actions">
            <button class="text-button" id="backgroundCancelButton" type="button">取消</button>
            <button class="primary-button" id="backgroundApplyButton" type="button">应用背景</button>
          </div>
        </footer>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden>
      <span class="toast-check"><svg><use href="#icon-check"></use></svg></span>
      <span id="toastText"></span>
    </div>

    <script src="app.js?v=20260710-4themes"></script>
  </body>
</html>
