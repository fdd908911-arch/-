          <span class="home-brand-copy">
            <strong>洄·Maneo</strong>
            <small>我们的私人空间</small>
          </span>
        </div>
        <div class="home-theme-indicator" aria-label="当前界面配色">
          <span class="home-theme-dot" aria-hidden="true"></span>
          <span id="homeThemeName">雾蓝杏粉</span>
        </div>
      </header>

      <section class="home-top-grid" aria-label="常用入口">
        <div class="moment-pair">
          <article class="days-card" aria-labelledby="relationshipCardTitle">
            <div class="days-card-glow" aria-hidden="true"></div>
            <header class="home-card-header">
              <span class="home-card-kicker" id="relationshipCardTitle">
                <span class="heart-mark" aria-hidden="true">♥</span>
                我们的时间
              </span>
              <button class="home-card-action" id="editDateButton" type="button" aria-label="设置开始日期">
                <svg><use href="#home-icon-edit"></use></svg>
              </button>
            </header>

            <div class="days-content">
              <p>我们已经在一起</p>
              <div class="days-number" aria-live="polite">
                <strong id="daysCount">—</strong>
                <span>天</span>
              </div>
              <p class="days-caption" id="daysCaption">FROM 2026.7.4</p>
            </div>

            <button class="date-entry" id="dateEntryButton" type="button">
              <span class="date-entry-icon"><svg><use href="#home-icon-calendar"></use></svg></span>
              <span>
                <small>FROM</small>
                <time id="startDateLabel" datetime="2026-07-04">2026.7.4</time>
              </span>
            </button>
          </article>

          <a
            class="weather-card"
            href="diary.html"
            aria-label="打开今天的 Diary 日记"
          >
            <div class="weather-card-glow" aria-hidden="true"></div>
            <header class="home-card-header">
              <span class="home-card-kicker" id="weatherCardTitle">
                今天 · <span id="todayDateLabel">—</span>
              </span>
              <span class="chat-arrow" aria-hidden="true">
                <svg><use href="#home-icon-arrow"></use></svg>
              </span>
            </header>

            <div class="weather-content">
              <div class="weather-summary">
                <span class="weather-emoji" id="weatherEmoji" aria-hidden="true">○</span>
                <div class="weather-reading">
                  <strong id="weatherTemperature">--°</strong>
                  <span id="weatherCondition">天气待记录</span>
                </div>
              </div>
              <blockquote id="dailyNote">今天想说的话，写在这里。</blockquote>
            </div>

            <footer class="weather-footer">打开 Diary · 只保存在这台设备</footer>
          </a>
        </div>

        <div class="entry-stack" aria-label="主要入口">
          <a class="chat-entry-card" href="chat.html#hub" aria-label="进入 Chat 入口页">
            <div class="chat-entry-decoration" aria-hidden="true"></div>
            <header class="home-card-header">
              <span class="home-card-kicker">常用入口</span>
              <span class="chat-arrow"><svg><use href="#home-icon-arrow"></use></svg></span>
            </header>
            <div class="chat-entry-content">
              <span class="chat-entry-icon"><svg><use href="#home-icon-chat"></use></svg></span>
              <div>
                <h1>Chat</h1>
                <p>进入我们的对话入口</p>
              </div>
            </div>
            <div class="chat-entry-footer">
              <span>Volo · 群聊 · 终端</span>
            </div>
          </a>

          <a class="memory-entry-card" href="memory.html" aria-label="进入 Memory 回忆页">
            <div class="memory-entry-decoration" aria-hidden="true"></div>
            <header class="home-card-header">
              <span class="home-card-kicker">珍藏片段</span>
              <span class="chat-arrow"><svg><use href="#home-icon-arrow"></use></svg></span>
            </header>
            <div class="memory-entry-content">
              <span class="memory-entry-icon"><svg><use href="#home-icon-memory"></use></svg></span>
              <div>
                <h2>Memory</h2>
                <p>收藏我们的回忆</p>
              </div>
            </div>
            <footer class="memory-entry-footer">留给时间慢慢填满</footer>
          </a>
        </div>
      </section>

      <section class="future-space" aria-label="更多入口与预留内容区域">
        <a class="status-entry-card" href="volo-status.html" aria-label="查看 Volo 现在的状态">
          <div class="status-entry-decoration" aria-hidden="true"></div>
          <header class="home-card-header">
            <span class="home-card-kicker">现在的状态</span>
            <span class="chat-arrow"><svg><use href="#home-icon-arrow"></use></svg></span>
          </header>
          <div class="status-entry-content">
            <span class="status-entry-icon"><svg><use href="#home-icon-status"></use></svg></span>
            <div>
              <h2>Volo 状态</h2>
              <p>看看他此刻怎么样</p>
            </div>
          </div>
          <footer class="status-entry-footer">打开状态页 · 内容稍后添加</footer>
        </a>
      </section>
    </main>

    <dialog class="date-dialog" id="dateDialog" aria-labelledby="dateDialogTitle">
      <form class="date-dialog-card" id="dateForm" method="dialog">
        <header class="date-dialog-header">
          <div>
            <span>我们的时间</span>
            <h2 id="dateDialogTitle">设置开始日期</h2>
            <p>开始当天按第 1 天计算，只保存在这台设备。</p>
          </div>
          <button class="date-dialog-close" id="dateDialogClose" type="button" aria-label="关闭">
            <svg><use href="#home-icon-close"></use></svg>
          </button>
        </header>

        <label class="date-field" for="relationshipDate">
          <span>在一起的日期</span>
          <input id="relationshipDate" name="relationshipDate" type="date" required />
        </label>
        <p class="date-error" id="dateError" role="alert" hidden></p>

        <footer class="date-dialog-footer">
          <button class="clear-date-button" id="clearDateButton" type="button">恢复默认</button>
          <div>
            <button class="date-cancel-button" id="dateCancelButton" type="button">取消</button>
            <button class="date-save-button" type="submit">
              <svg><use href="#home-icon-check"></use></svg>
              保存
            </button>
          </div>
        </footer>
      </form>
    </dialog>

    <div class="home-toast" id="homeToast" role="status" aria-live="polite" hidden>
      <span><svg><use href="#home-icon-check"></use></svg></span>
      <strong id="homeToastText"></strong>
    </div>
