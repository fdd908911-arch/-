<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta id="themeColorMeta" name="theme-color" content="#eef2f1" />
    <meta
      name="description"
      content="岛屿信箱开场页，记录在一起的日子并进入 Chat、Diary 与 Memory"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%237ea4ba'/%3E%3Cpath d='M13 30 51 14 39 49l-9-10-7 7 1-13 22-14-27 11z' fill='white'/%3E%3C/svg%3E"
    />
    <title>岛屿 · 开场页</title>
    <script>
      try {
        var savedAppearance = JSON.parse(
          localStorage.getItem("island-chat.preferences.v1")
        );
        var legacyThemes = { coast: "zen", dusk: "sage", paper: "blush" };
        var savedTheme =
          (savedAppearance &&
            (savedAppearance.theme ||
              legacyThemes[savedAppearance.id] ||
              savedAppearance.id)) ||
          "mist";
        if (["mist", "zen", "sage", "blush"].indexOf(savedTheme) === -1) {
          savedTheme = "mist";
        }
        document.documentElement.dataset.theme = savedTheme;
      } catch (error) {
        document.documentElement.dataset.theme = "mist";
      }
    </script>
    <link rel="stylesheet" href="styles.css?v=20260710-theme-switch-v3" />
    <link rel="stylesheet" href="home.css?v=20260711-home-flower-v8" />
    <link rel="stylesheet" href="clawd-pet.css?v=20260711-clawd-v4" />
  </head>
  <body class="home-page">
    <svg class="svg-sprite" aria-hidden="true">
      <symbol id="home-icon-calendar" viewBox="0 0 24 24">
        <rect x="3.5" y="5.5" width="17" height="15" rx="3" />
        <path d="M8 3.5v4M16 3.5v4M3.5 10h17" />
        <path d="M8 14h.1M12 14h.1M16 14h.1M8 17.5h.1M12 17.5h.1" />
      </symbol>
      <symbol id="home-icon-chat" viewBox="0 0 24 24">
        <path d="M5 18.5 3.8 21l3.8-1.2c1.3.7 2.8 1 4.4 1 5 0 9-3.7 9-8.4S17 4 12 4s-9 3.7-9 8.4c0 2.4.7 4.4 2 6.1Z" />
        <path d="M8 12h.1M12 12h.1M16 12h.1" />
      </symbol>
      <symbol id="home-icon-memory" viewBox="0 0 24 24">
        <path d="M5 4.5h11.5A2.5 2.5 0 0 1 19 7v12.5H7.5A2.5 2.5 0 0 1 5 17V4.5Z" />
        <path d="M7.5 19.5A2.5 2.5 0 0 1 10 17h9M9 9.2c0-1.9 2.4-2.6 3-1 0.6-1.6 3-0.9 3 1 0 1.5-1.5 2.6-3 3.7-1.5-1.1-3-2.2-3-3.7Z" />
      </symbol>
      <symbol id="home-icon-arrow" viewBox="0 0 24 24">
        <path d="M5 12h14M14 7l5 5-5 5" />
      </symbol>
      <symbol id="home-icon-edit" viewBox="0 0 24 24">
        <path d="m14.5 5.5 4 4M5 19l3.7-.8L19 6.9a1.4 1.4 0 0 0 0-2l-.9-.9a1.4 1.4 0 0 0-2 0L5.8 14.3 5 19Z" />
      </symbol>
      <symbol id="home-icon-close" viewBox="0 0 24 24">
        <path d="m6 6 12 12M18 6 6 18" />
      </symbol>
      <symbol id="home-icon-check" viewBox="0 0 24 24">
        <path d="m5 12 4 4L19 6" />
      </symbol>
    </svg>

    <div class="home-ambient home-ambient-one" aria-hidden="true"></div>
    <div class="home-ambient home-ambient-two" aria-hidden="true"></div>

    <main class="home-shell">
      <header class="home-header">
        <div class="home-brand">
          <span class="home-brand-flower" aria-hidden="true">
            <svg viewBox="0 0 48 48" focusable="false">
              <g class="home-flower-petals">
                <rect class="home-flower-petal" x="21.2" y="1.5" width="5.6" height="22.8" rx="2.8" />
                <rect class="home-flower-petal" x="21.7" y="3.4" width="4.6" height="20.9" rx="2.3" transform="rotate(28 24 24)" />
                <rect class="home-flower-petal" x="21.3" y="1.9" width="5.4" height="22.4" rx="2.7" transform="rotate(56 24 24)" />
                <rect class="home-flower-petal" x="21.8" y="4.1" width="4.4" height="20.2" rx="2.2" transform="rotate(84 24 24)" />
                <rect class="home-flower-petal" x="21.1" y="2.4" width="5.8" height="21.9" rx="2.9" transform="rotate(112 24 24)" />
                <rect class="home-flower-petal" x="21.6" y="3.2" width="4.8" height="21.1" rx="2.4" transform="rotate(140 24 24)" />
                <rect class="home-flower-petal" x="21.3" y="1.7" width="5.4" height="22.6" rx="2.7" transform="rotate(168 24 24)" />
                <rect class="home-flower-petal" x="21.7" y="3.8" width="4.6" height="20.5" rx="2.3" transform="rotate(196 24 24)" />
                <rect class="home-flower-petal" x="21.1" y="2.1" width="5.8" height="22.2" rx="2.9" transform="rotate(224 24 24)" />
                <rect class="home-flower-petal" x="21.6" y="4" width="4.8" height="20.3" rx="2.4" transform="rotate(252 24 24)" />
                <rect class="home-flower-petal" x="21.3" y="1.6" width="5.4" height="22.7" rx="2.7" transform="rotate(280 24 24)" />
                <rect class="home-flower-petal" x="21.8" y="3.5" width="4.4" height="20.8" rx="2.2" transform="rotate(308 24 24)" />
                <rect class="home-flower-petal" x="21.2" y="2.5" width="5.6" height="21.8" rx="2.8" transform="rotate(336 24 24)" />
              </g>
              <circle cx="24" cy="24" r="4.8" />
            </svg>
          </span>
          <span class="home-brand-copy">
            <strong>岛屿</strong>
            <small>我们的私人空间</small>
          </span>
        </div>
        <div class="home-theme-indicator" aria-label="当前界面配色">
          <span class="home-theme-dot" aria-hidden="true"></span>
          <span id="homeThemeName">雾蓝杏粉</span>
        </div>
      </header>

      <section class="home-top-grid" aria-label="常用入口">
        <div class="moment-pair">
          <article class="days-card" aria-labelledby="relationshipCardTitle">
            <div class="days-card-glow" aria-hidden="true"></div>
            <header class="home-card-header">
              <span class="home-card-kicker" id="relationshipCardTitle">
                <span class="heart-mark" aria-hidden="true">♥</span>
                我们的时间
              </span>
              <button class="home-card-action" id="editDateButton" type="button" aria-label="设置开始日期">
                <svg><use href="#home-icon-edit"></use></svg>
              </button>
            </header>

            <div class="days-content">
              <p>我们已经在一起</p>
              <div class="days-number" aria-live="polite">
                <strong id="daysCount">—</strong>
                <span>天</span>
              </div>
              <p class="days-caption" id="daysCaption">FROM 2026.7.4</p>
            </div>

            <button class="date-entry" id="dateEntryButton" type="button">
              <span class="date-entry-icon"><svg><use href="#home-icon-calendar"></use></svg></span>
              <span>
                <small>FROM</small>
                <time id="startDateLabel" datetime="2026-07-04">2026.7.4</time>
              </span>
            </button>
          </article>

          <a
            class="weather-card"
            href="diary.html"
            aria-label="打开今天的 Diary 日记"
          >
            <div class="weather-card-glow" aria-hidden="true"></div>
            <header class="home-card-header">
              <span class="home-card-kicker" id="weatherCardTitle">
                今天 · <span id="todayDateLabel">—</span>
              </span>
              <span class="chat-arrow" aria-hidden="true">
                <svg><use href="#home-icon-arrow"></use></svg>
              </span>
            </header>

            <div class="weather-content">
              <div class="weather-summary">
                <span class="weather-emoji" id="weatherEmoji" aria-hidden="true">○</span>
                <div class="weather-reading">
                  <strong id="weatherTemperature">--°</strong>
                  <span id="weatherCondition">天气待记录</span>
                </div>
              </div>
              <blockquote id="dailyNote">今天想说的话，写在这里。</blockquote>
            </div>

            <footer class="weather-footer">打开 Diary · 只保存在这台设备</footer>
          </a>
        </div>

        <div class="entry-stack" aria-label="主要入口">
          <a class="chat-entry-card" href="chat.html" aria-label="进入 Chat 聊天页">
            <div class="chat-entry-decoration" aria-hidden="true"></div>
            <header class="home-card-header">
              <span class="home-card-kicker">常用入口</span>
              <span class="chat-arrow"><svg><use href="#home-icon-arrow"></use></svg></span>
            </header>
            <div class="chat-entry-content">
              <span class="chat-entry-icon"><svg><use href="#home-icon-chat"></use></svg></span>
              <div>
                <h1>Chat</h1>
                <p>进入我们的对话</p>
              </div>
            </div>
            <div class="chat-entry-footer">
              <span>继续说说话</span>
            </div>
          </a>

          <a class="memory-entry-card" href="memory.html" aria-label="进入 Memory 回忆页">
            <div class="memory-entry-decoration" aria-hidden="true"></div>
            <header class="home-card-header">
              <span class="home-card-kicker">珍藏片段</span>
              <span class="chat-arrow"><svg><use href="#home-icon-arrow"></use></svg></span>
            </header>
            <div class="memory-entry-content">
              <span class="memory-entry-icon"><svg><use href="#home-icon-memory"></use></svg></span>
              <div>
                <h2>Memory</h2>
                <p>收藏我们的回忆</p>
              </div>
            </div>
            <footer class="memory-entry-footer">留给时间慢慢填满</footer>
          </a>
        </div>
      </section>

      <section class="future-space" aria-label="预留内容区域"></section>
    </main>

    <dialog class="date-dialog" id="dateDialog" aria-labelledby="dateDialogTitle">
      <form class="date-dialog-card" id="dateForm" method="dialog">
        <header class="date-dialog-header">
          <div>
            <span>我们的时间</span>
            <h2 id="dateDialogTitle">设置开始日期</h2>
            <p>开始当天按第 1 天计算，只保存在这台设备。</p>
          </div>
          <button class="date-dialog-close" id="dateDialogClose" type="button" aria-label="关闭">
            <svg><use href="#home-icon-close"></use></svg>
          </button>
        </header>

        <label class="date-field" for="relationshipDate">
          <span>在一起的日期</span>
          <input id="relationshipDate" name="relationshipDate" type="date" required />
        </label>
        <p class="date-error" id="dateError" role="alert" hidden></p>

        <footer class="date-dialog-footer">
          <button class="clear-date-button" id="clearDateButton" type="button">恢复默认</button>
          <div>
            <button class="date-cancel-button" id="dateCancelButton" type="button">取消</button>
            <button class="date-save-button" type="submit">
              <svg><use href="#home-icon-check"></use></svg>
              保存
            </button>
          </div>
        </footer>
      </form>
    </dialog>

    <div class="home-toast" id="homeToast" role="status" aria-live="polite" hidden>
      <span><svg><use href="#home-icon-check"></use></svg></span>
      <strong id="homeToastText"></strong>
    </div>

    <script src="clawd-pet.js?v=20260711-clawd-v5"></script>
    <script src="home.js?v=20260711-home-diary-v5"></script>
  </body>
</html>
