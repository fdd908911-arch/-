<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta id="themeColorMeta" name="theme-color" content="#eef2f0" />
    <meta name="description" content="洄·Maneo信箱的水族馆页面" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%235c8b85'/%3E%3Cpath d='M12 35c11-13 29-13 40 0-11 13-29 13-40 0Z' fill='none' stroke='white' stroke-width='3.5'/%3E%3Ccircle cx='43' cy='33' r='2.5' fill='white'/%3E%3C/svg%3E"
    />
    <title>洄·Maneo · 水族馆</title>
    <script>
      try {
        var savedAppearance = JSON.parse(
          localStorage.getItem("island-chat.preferences.v1")
        );
        var legacyThemes = { coast: "zen", dusk: "sage", paper: "blush" };
        var savedTheme =
          (savedAppearance &&
            (savedAppearance.theme ||
              legacyThemes[savedAppearance.id] ||
              savedAppearance.id)) ||
          "mist";
        var themeColors = {
          mist: "#eef2f0",
          zen: "#f2efe8",
          sage: "#f1f1e7",
          blush: "#ebeef1"
        };
        if (!themeColors[savedTheme]) {
          savedTheme = "mist";
        }
        document.documentElement.dataset.theme = savedTheme;
        document.getElementById("themeColorMeta").setAttribute(
          "content",
          themeColors[savedTheme]
        );
      } catch (error) {
        document.documentElement.dataset.theme = "mist";
      }
    </script>
    <link rel="stylesheet" href="styles.css?v=20260711-theme-palettes-v1" />
    <link rel="stylesheet" href="home.css?v=20260711-theme-palettes-v1" />
    <link rel="stylesheet" href="memory.css?v=20260711-theme-palettes-v1" />
    <link rel="stylesheet" href="world.css?v=20260711-aquarium-page-v1" />
    <link rel="stylesheet" href="clawd-pet.css?v=20260711-clawd-v4" />
  </head>

        <path d="m4 12-2.2-3v6L4 12Z" />
        <circle cx="14.5" cy="11" r="0.7" />

    </svg>

    <span class="home-ambient home-ambient-one" aria-hidden="true"></span>
